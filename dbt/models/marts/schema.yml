version: 2

models:
  - name: stg_news_articles
    description: Cleaned staging layer for AirKube news ingestion.
    columns:
      - name: article_id
        tests:
          - not_null
          - unique
      - name: title
        tests:
          - not_null
      - name: source_name
        tests:
          - not_null
      - name: published_at
        tests:
          - not_null
  - name: fct_daily_article_counts
    description: Daily source-level aggregation used for reporting and pipeline monitoring.
    columns:
      - name: published_date
        tests:
          - not_null
      - name: source_name
        tests:
          - not_null
      - name: article_count
        tests:
          - not_null
